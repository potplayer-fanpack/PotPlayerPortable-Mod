4214=O upload de replay é um recurso disponível para produtores autorizados,\nque permite que transmissões ao vivo sejam enviadas automaticamente\ncomo VOD. O vídeo pode ter até 12 horas de duração\ne pode ser visualizado na lista de reprodução do canal.
4215=A transmissão Tough é permitida apenas para produtores com 19 anos ou mais.\nAlgumas palavrões leves e imagens de violência são tolerados.\n\nNo entanto, o uso excessivo de linguagem ofensiva, obscenidade e conteúdos similares\npoderá ser bloqueado sem aviso prévio.\nAlém disso, conforme a legislação aplicável, sanções legais poderão ser aplicadas.
